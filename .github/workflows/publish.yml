name: Publish

on:
  push:
    branches:
      - master

# Only one release run at a time.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write       # changesets/action pushes the "Version Packages" PR + tags/releases
  pull-requests: write  # changesets/action opens/updates the release PR
  id-token: write       # REQUIRED for npm OIDC trusted publishing + provenance

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest   # OIDC requires a GitHub-hosted runner
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org   # writes the .npmrc the publish step reads
          # IMPORTANT: do NOT set NODE_AUTH_TOKEN / always-auth — a token present defeats OIDC.

      # Trusted publishing needs npm >= 11.5.1; Node 20 ships an older npm, so upgrade.
      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          # No NPM_TOKEN — authentication is via OIDC (id-token: write).
