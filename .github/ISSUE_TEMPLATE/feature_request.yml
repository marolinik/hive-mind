name: Feature request
description: Suggest an idea or enhancement for hive-mind.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Please search [existing issues](https://github.com/marolinik/hive-mind/issues)
        and [Discussions](https://github.com/marolinik/hive-mind/discussions) first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What is the pain point or use case driving this request?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior or capability you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions, workarounds, or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: package
    attributes:
      label: Which package does this affect?
      description: Select the most relevant package. Choose "Unsure / multiple" if it spans several.
      options:
        - "@hive-mind/core"
        - "@hive-mind/wiki-compiler"
        - "@hive-mind/mcp-server"
        - "@hive-mind/cli"
        - "@hive-mind/claude-code-hooks"
        - "@hive-mind/enrichment"
        - "@hive-mind/wiki-web"
        - "Unsure / multiple"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, links, or references here.
    validations:
      required: false
